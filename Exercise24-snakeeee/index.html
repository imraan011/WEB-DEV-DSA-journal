<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Snake game Zone</title>
  </head>
  <body>
    <main>
      <section >
        <div class="infos">
          <div class="info">
            <h3>High Score :<span id="Hscore"> 00</span></h3>
          </div>
          <div class="info" >
            <h3>Score :<span id="score"> 00</span></h3>
          </div>
          <div class="info" >
            <h3>Time : <span  id="time"> 00:00</span></h3>
          </div>
        </div>

        <div class="board"></div>
      </section>
      <section >
        <div class="modal">
          <div class="startgame">
            <h2>Welcome to Snake Game</h2>
            <button class="Startbtn  btn">Start</button>
          </div>
          <div class="gameover">
            <h2>Game Over</h2>
            <button class="Restartbtn  btn">Restart</button>
          </div>
        </div>

      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
